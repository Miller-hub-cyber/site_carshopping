<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarShopping - Criar Conta</title>
    
    <!-- Fonte Google: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Arquivo CSS (Pode usar o mesmo do login ou criar um style.css global) -->
    <link rel="stylesheet" href="../CSS/cadastro.css">
</head>
<body>

    <!-- Container principal com animação de entrada -->
    <div class="login-container fade-in">
        
        <!-- Logo -->
        <div class="logo">
            <img src="../fotos/logo.png" alt="CarShopping Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;">Car<span>Shopping</span></span>
        </div>

        <h2>Crie sua conta</h2>
        <p class="subtitle">Junte-se a nós rápida e facilmente</p>

        <!-- Botões de Login Social -->
        <div class="social-login">
            <button class="social-btn google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google">
                Google
            </button>
            <button class="social-btn facebook-btn">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </button>
        </div>

        <div class="divider">
            <span>ou cadastre-se com e-mail</span>
        </div>

        <!-- Área de mensagens de erro -->
        <div id="error-message" class="error-message"></div>

        <!-- Formulário de Cadastro -->
        <form action="/register" id="register-form" method="post">
            <!-- Campo Nome -->
            <div class="input-group">
                <i class="fas fa-user icon"></i>
                <input type="text" id="name" name="name" placeholder="Nome Completo" autocomplete="name" required>
            </div>

            <!-- Campo E-mail -->
            <div class="input-group">
                <i class="fas fa-envelope icon"></i>
                <input type="email" id="email" name="email" placeholder="E-mail" autocomplete="email" required>
            </div>

            <!-- Campo Senha -->
            <div class="input-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" id="password" name="password" placeholder="Senha" autocomplete="new-password" required>
                <i class="fas fa-eye toggle-password" title="Mostrar/Ocultar Senha"></i>
            </div>

            <!-- Campo Confirmar Senha -->
            <div class="input-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmar Senha" autocomplete="new-password" required>
                <i class="fas fa-eye toggle-password" title="Mostrar/Ocultar Senha"></i>
            </div>

            <!-- Termos de uso -->
            <div class="options">
                <label class="checkbox-container">
                    <input type="checkbox" id="terms" name="terms" required> 
                    <span class="checkmark"></span>
                    Concordo com os <a href="#" class="forgot-password">Termos de Uso</a>
                </label>
            </div>

            <!-- Botão de Cadastro -->
            <button type="submit" class="login-btn" id="submit-btn" name="submit-btn">Cadastrar</button>
        </form>

        <!-- Link para voltar ao login -->
        <div class="signup">
            Já tem uma conta? <a href="../HTML/login.html">Faça login</a>
        </div>
    </div>

    <!-- Arquivo JavaScript -->
    <script src="../JS/cadastro.js"></script>
</body>
</html>
