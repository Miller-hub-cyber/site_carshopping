<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarShopping - Detalhe do Veículo</title>
    <meta name="description" content="Veja todos os detalhes deste veículo no CarShopping: fotos, especificações, preço e contato direto com o vendedor.">

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"></noscript>

    <!-- Ícones e Estilos -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="../CSS/tokens.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/detalhe.css">
    <link rel="icon" href="../fotos/logo.ico" type="image/x-icon">
</head>

<body>
    <a href="#main-content" class="skip-link">Pular para conteúdo</a>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <div class="container header-container">
            <a href="../HTML/index.html" class="logo">
                <picture><source srcset="../fotos/logo.webp" type="image/webp"><img src="../fotos/logo.png" width="150" height="38" alt="Logotipo CarShopping"></picture>
            </a>

            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Abrir menu mobile">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav-menu" id="nav-menu" aria-label="Navegação Principal">
                <ul>
                    <li><a href="../HTML/index.html#">Categorias</a></li>
                    <li><a href="../HTML/busca.html" class="active">Compra</a></li>
                    <li><a href="../HTML/servicos.html">Serviços</a></li>
                    <li><a href="../HTML/vender.html">Venda o Carro</a></li>
                    <li><a href="../HTML/contato.html">Contato</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <a href="#" class="action-link"><i class="fa-regular fa-heart"></i> Favorito</a>
                <a href="../HTML/busca.html" class="action-link"><i class="fa-solid fa-magnifying-glass"></i> Buscar</a>
                <button class="dark-mode-btn" id="dark-mode-btn" aria-label="Ativar modo escuro" title="Ativar modo escuro"><i class="fa-solid fa-moon"></i></button>
                <div id="header-auth"><a href="../HTML/cadastro.html" class="btn-primary">Cadastre-se</a></div>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="detalhe-section">
            <div class="container" id="detalhe-content">
                <!-- Preenchido por detalhe.js -->
                <div class="detalhe-loading">
                    <i class="fa-solid fa-spinner"></i>
                    <span>Carregando veículo...</span>
                </div>
            </div>
        </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="contact-info">
                    <p>Contato: <span>11 99999-9999</span></p>
                </div>
                <div class="footer-logo">
                    <picture><source srcset="../fotos/unama.webp" type="image/webp"><img src="../fotos/unama.png" alt="Logo Unama" width="97" height="97" loading="lazy"></picture>
                </div>
                <div class="app-links">
                    <a href="#"><picture><source srcset="../fotos/GooglePlay.webp" type="image/webp"><img src="../fotos/GooglePlay.png" alt="Disponível no Play Store" width="135" height="40" loading="lazy"></picture></a>
                    <a href="#"><picture><source srcset="../fotos/AppStore.webp" type="image/webp"><img src="../fotos/AppStore.png" alt="Disponível na App Store" width="135" height="40" loading="lazy"></picture></a>
                    <a href="#"><picture><source srcset="../fotos/HuaweiAppGallery.webp" type="image/webp"><img src="../fotos/HuaweiAppGallery.png" alt="Disponível na App Gallery" width="134" height="40" loading="lazy"></picture></a>
                </div>
            </div>
            <div class="footer-bottom">
                <div class="email">
                    <p>Email: <br><span>carshopping@gmail.com</span></p>
                </div>
                <div class="copyright">
                    <p>© Todos os Direitos Reservados</p>
                    <div class="legal-links">
                        <a href="#">Accessibility Certificate</a>
                        <a href="#">Cookie Policy</a>
                        <a href="#">Cookie Settings</a>
                    </div>
                </div>
                <div class="language-selector">
                    <i class="fa-solid fa-globe"></i>
                    <select aria-label="Selecione o idioma">
                        <option>English</option>
                        <option>Português</option>
                    </select>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../JS/utils.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/detalhe.js"></script>
    <script src="../JS/cookies.js"></script>
</body>

</html>
