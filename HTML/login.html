<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarShopping - Entrar</title>
    <meta name="description" content="Acesse sua conta no CarShopping para gerenciar seus anúncios e favoritos.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonte Google: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="../CSS/tokens.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="icon" href="../fotos/logo.ico" type="image/x-icon">
</head>

<body>

    <!-- Container principal com animação de entrada -->
    <div class="login-container fade-in">

        <!-- Logo -->
        <div class="logo">
            <!-- Caso não tenha a imagem, exibirá o texto estilizado -->
            <img src="../fotos/logo.png" alt="CarShopping Logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;">Car<span>Shopping</span></span>
        </div>

        <h2>Bem-vindo de volta!</h2>
        <p class="subtitle">Faça login para continuar</p>

        <!-- Botões de Login Social -->
        <div class="social-login">
            <button class="social-btn google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google">
                Google
            </button>
            <button class="social-btn facebook-btn">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </button>
        </div>

        <div class="divider">
            <span>ou entre com seu e-mail</span>
        </div>

        <!-- Área de mensagens de erro -->
        <div id="error-message" class="error-message"></div>

        <!-- Formulário -->
        <form id="login-form">
            <!-- Campo E-mail -->
            <div class="input-group">
                <i class="fas fa-envelope icon"></i>
                <input type="email" id="email" placeholder="E-mail ou Usuário" autocomplete="email">
            </div>

            <!-- Campo Senha -->
            <div class="input-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
                <i class="fas fa-eye toggle-password" id="toggle-password" title="Mostrar/Ocultar Senha"></i>
            </div>

            <!-- Opções extras -->
            <div class="options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember">
                    <span class="checkmark"></span>
                    Lembrar de mim
                </label>
                <a href="../HTML/recuperar-senha.html" class="forgot-password">Esqueci a senha</a>
            </div>

            <!-- Botão de Login -->
            <button type="submit" class="login-btn" id="submit-btn">Entrar</button>
        </form>

        <!-- Link para criar conta -->
        <div class="signup">
            Não tem uma conta? <a href="../HTML/cadastro.html">Crie uma agora</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../JS/utils.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/login.js"></script>
    <script src="../JS/cookies.js"></script>
</body>

</html>
