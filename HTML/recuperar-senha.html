<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarShopping - Recuperar Senha</title>
    <meta name="description" content="Recupere o acesso à sua conta no CarShopping.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonte Google: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Ícones FontAwesome -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>

    <!-- Estilos -->
    <link rel="stylesheet" href="../CSS/tokens.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="icon" href="../fotos/logo.ico" type="image/x-icon">
</head>

<body>

    <!-- Container principal com a mesma animação e estilo do login -->
    <div class="login-container fade-in">

        <!-- Logo -->
        <div class="logo">
            <picture><source srcset="../fotos/logo.webp" type="image/webp"><img src="../fotos/logo.png" alt="CarShopping Logo" width="452" height="116" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"></picture>
            <span style="display: none;">Car<span>Shopping</span></span>
        </div>

        <h2>Esqueceu a senha?</h2>
        <p class="subtitle">Digite seu e-mail cadastrado e enviaremos um link de recuperação.</p>

        <!-- Área de mensagens de erro e sucesso -->
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message" style="display: none;"></div>

        <!-- Formulário -->
        <form id="recovery-form">
            <!-- Campo E-mail -->
            <div class="input-group">
                <i class="fas fa-envelope icon"></i>
                <input type="email" id="email" placeholder="Digite seu e-mail" autocomplete="email">
            </div>

            <!-- Botão de Envio -->
            <button type="submit" class="login-btn" id="submit-btn">Enviar Link de Recuperação</button>
        </form>

        <!-- Link para voltar ao Login -->
        <div class="signup">
            Lembrou a senha? <a href="../HTML/login.html"><i class="fas fa-arrow-left"></i> Voltar ao Login</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../JS/utils.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/recuperar-senha.js"></script>
    <script src="../JS/cookies.js"></script>
</body>

</html>
