[build]
  publish = "."

# Redireciona raiz para a página inicial
[[redirects]]
  from = "/"
  to   = "/HTML/index.html"
  status = 200

# Segurança — headers para todas as páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

    # CSP: define origens permitidas para cada tipo de recurso
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://cdn-icons-png.flaticon.com; connect-src 'self' https://sitecarshopping-production.up.railway.app; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

    # Permissions-Policy: desativa funcionalidades do navegador que o site não usa
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

# Cache longo para assets estáticos
[[headers]]
  for = "/fotos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/CSS/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/JS/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
