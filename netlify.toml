# Segurança — headers para todas as páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

    # CSP: define origens permitidas para cada tipo de recurso
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://cdn-icons-png.flaticon.com https://sitecarshopping-production.up.railway.app https://res.cloudinary.com https://ik.imagekit.io; connect-src 'self' https://sitecarshopping-production.up.railway.app; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

    # Permissions-Policy: desativa funcionalidades do navegador que o site não usa
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

# Cache longo para assets estáticos
[[headers]]
  for = "/fotos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/CSS/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/JS/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
